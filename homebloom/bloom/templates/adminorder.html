<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Orders | Admin Dashboard | HOME BLOOM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            background:#f4f1ec;
        }

        .dashboard-wrapper{
            display:flex;
            min-height:100vh;
        }

        /* SIDEBAR */
        .sidebar{
            width:240px;
            background:#3f3007;
            color:#fff;
            padding:30px 20px;
        }

        .brand{
            font-size:1.4rem;
            letter-spacing:2px;
            margin-bottom:40px;
        }

        .sidebar nav a{
            display:block;
            color:#ddd;
            text-decoration:none;
            padding:12px 15px;
            border-radius:8px;
            margin-bottom:10px;
        }

        .sidebar nav a.active,
        .sidebar nav a:hover{
            background:#8B6F47;
            color:#fff;
        }

        .logout{
            margin-top:30px;
            background:#2b2205;
        }

        /* MAIN */
        .main-content{
            flex:1;
            padding:30px 40px;
        }

        .top-bar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:30px;
        }

        .top-bar h1{
            font-size:1.8rem;
            color:#3f3007;
        }

        .admin-info{
            background:#fff;
            padding:10px 18px;
            border-radius:10px;
            box-shadow:0 4px 12px rgba(0,0,0,.1);
        }

        /* TABLE */
        .table-wrapper{
            background:#fff;
            border-radius:16px;
            padding:25px;
            box-shadow:0 10px 30px rgba(0,0,0,.08);
            overflow-x:auto;
        }

        table{
            width:100%;
            border-collapse:collapse;
            min-width:100px;
        }

        th,td{
            padding:14px;
            text-align:left;
            border-bottom:1px solid #e0e0e0;
            font-size:0.9rem;
        }

        th{
            color:#777;
            font-weight:500;
        }

        .product{
            display:flex;
            align-items:center;
            gap:10px;
        }

        .product img{
            width:48px;
            height:48px;
            object-fit:cover;
            border-radius:8px;
            border:1px solid #ddd;
        }

        select{
            padding:6px 10px;
            border-radius:8px;
            border:1px solid #ccc;
            font-size:0.85rem;
        }

        .actions a{
            padding:6px 12px;
            border-radius:8px;
            font-size:0.8rem;
            text-decoration:none;
            color:#fff;
            margin-right:6px;
        }

        .view{
            background:#3f3007;
        }

        .update{
            background:#8B6F47;
        }

        @media(max-width:576px){
            .sidebar{
                display:none;
            }
        }
    </style>
</head>
<body>

<div class="dashboard-wrapper">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2 class="brand">HOME BLOOM</h2>
        <nav>
            <a href="{% url 'admindashboard' %}">Dashboard</a>
            <a href="{%url 'adminproduct'%}">Products</a>
            <a href="{% url 'adminorder' %}">Orders</a>
             <a href="{%url 'admincustomer'%}">Customers</a>
            <a href="{%url 'admincategory'%}">Categories</a>
            <a href="{%url 'admincoupon'%}">Coupons</a>
            <a href="/" class="logout">Logout</a>
        </nav>
    </aside>

    <!-- MAIN -->
    <main class="main-content">

        <div class="top-bar">
            <h1>Orders</h1>
            <div class="admin-info">Admin</div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Order ID</th>
                        <th>User</th>
                        <th>Total Price</th>
                        <th>Payment</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>
                            <div class="product">
                                <img src="product.jpg">
                                <span>Modern Chair</span>
                            </div>
                        </td>
                        <td>#HB2041</td>
                        <td>Rahul</td>
                        <td>₹4,999</td>
                        <td>UPI</td>
                        <td>
                            <select>
                                <option>Order Placed</option>
                                <option>Processing</option>
                                <option>Shipped</option>
                                <option>Out for Delivery</option>
                                <option>Delivered</option>
                            </select>
                        </td>
                        <td class="actions">
                            <a href="#" class="view">View</a>
                            <a href="#" class="update">Cancel</a>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <div class="product">
                                <img src="product.jpg">
                                <span>Wooden Lamp</span>
                            </div>
                        </td>
                        <td>#HB2042</td>
                        <td>Ananya</td>
                        <td>₹2,199</td>
                        <td>Card</td>
                        <td>
                            <select>
                                <option>Order Placed</option>
                                <option selected>Processing</option>
                                <option>Shipped</option>
                                <option>Out for Delivery</option>
                                <option>Delivered</option>
                            </select>
                        </td>
                        <td class="actions">
                            <a href="#" class="view">View</a>
                            <a href="#" class="update">Cancel</a>
                        </td>
                    </tr>

                </tbody>
            </table>
        </div>

    </main>
</div>

</body>
</html>
