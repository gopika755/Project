<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | HOME BLOOM</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">

<style>
:root{
--primary:#8B6F47;
--accent:#3f3007;
--bg:#e4d1bb;
--light:#dbc7ad;
--text:#333;
}

body{
font-family:Georgia,serif;
background:var(--bg);
color:var(--text);
}

/* PAGE WRAPPER */
.auth-wrapper{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:40px 15px;
}

/* CARD */
.auth-card{
background:#fff;
width:100%;
max-width:1100px;
display:grid;
grid-template-columns:1fr 1fr;
border-radius:6px;
overflow:hidden;
box-shadow:0 10px 40px rgba(0,0,0,.15);
}

/* LEFT – LOGIN */
.auth-left{
padding:50px;
}

.auth-left h2{
font-size:1.6rem;
letter-spacing:2px;
margin-bottom:30px;
text-transform:uppercase;
}

.form-group{
margin-bottom:20px;
}

.form-group label{
font-weight:600;
margin-bottom:6px;
display:block;
}

.form-group input{
width:100%;
padding:10px 12px;
border:1px solid #bbb;
border-radius:2px;
}

.forgot{
text-align:right;
font-size:.9rem;
margin-top:5px;
}

.forgot a{
color:var(--primary);
text-decoration:none;
}

/* CAPTCHA PLACEHOLDER */
.captcha-box{
border:1px solid #ccc;
padding:15px;
display:flex;
align-items:center;
gap:10px;
margin:25px 0;
font-size:.9rem;
}

/* LOGIN BUTTON */
.login-btn{
width:100%;
padding:14px;
background:#8b7355;
color:#fff;
border:none;
letter-spacing:2px;
font-weight:600;
}

/* RIGHT – SIGN UP */
.auth-right{
background:#faf7f3;
padding:50px;
border-left:1px solid #ddd;
}

.auth-right h3{
font-size:1.2rem;
letter-spacing:2px;
margin-bottom:20px;
text-transform:uppercase;
}

.auth-right p{
font-size:.95rem;
line-height:1.7;
margin-bottom:20px;
}

.auth-right ul{
padding-left:18px;
font-size:.95rem;
line-height:1.8;
margin-bottom:30px;
}

.signup-btn{
width:100%;
padding:14px;
border:1px solid var(--primary);
background:transparent;
color:var(--primary);
letter-spacing:2px;
font-weight:600;
}

/* RESPONSIVE */
@media(max-width:992px){
.auth-card{
grid-template-columns:1fr;
}
.auth-right{
border-left:none;
border-top:1px solid #ddd;
}
}
.page-title-section {
            background-color: var(--bg-light);
            padding: 11px 0;
            text-align: center;
            
        }
        .page-title {
            font-size: 3rem;
            font-weight: 700;
            text-decoration: none;
            color: #8b7355;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .signup-btn{
display:block;
text-align:center;
text-decoration:none;
width:100%;
padding:14px;
background: #8b7355;
color:#fff;
border:none;
letter-spacing:2px;
font-weight:600;
}


</style>
</head>

<body>
<section class="page-title-section">
        <div class="container">
            <a href='/'class="page-title">HOME BLOOM</a>
        </div>
    </section>
<div class="auth-wrapper">
<div class="auth-card">

<!-- LEFT: LOGIN -->
<div class="auth-left">
<h2>Login</h2>

<div class="form-group">
<label>Email *</label>
<input type="email">
</div>

<div class="form-group">
<label>Password *</label>
<input type="password">
<div class="forgot"><a href="{%url 'forgot'%}">Forgot the password?</a></div>
</div>

<button class="login-btn">LOGIN</button>
</div>

<!-- RIGHT: SIGN UP -->
<div class="auth-right">
<h3>New to Home Bloom?</h3>

<p>
Make shopping for beautiful interiors effortless by creating an account.
</p>

<ul>
<li>Save items to your favourites</li>
<li>Manage your address details</li>
</ul>
<a href="{%url 'signup'%}" class="signup-btn">SIGN UP</a>

</div>

</div>
</div>

</body>
</html>
