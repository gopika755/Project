<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkout | HOME BLOOM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.1/font/bootstrap-icons.min.css" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Georgia", serif;
}

:root {
    --primary: #8B6F47;
    --secondary: #8b7355;
    --highlight:  #8b7355;
    --bg: #e4d1bbff;
}

body {
    background: var(--bg);
}

/* HEADER */
.header {
    background: #dbc7adff;
    text-align: center;
    padding: 25px 0;
    margin-bottom: 30px;
}

.header a {
    font-size: 3rem;
    color: var(--primary);
    text-decoration: none;
    letter-spacing: 3px;
    font-weight: 700;
}

/* LAYOUT */
.checkout-container {
    max-width: 1200px;
    margin: auto;
    padding: 0 20px 60px;
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 30px;
}

/* BOX */
.box {
    background: #fff;
    border-radius: 8px;
    align-self: flex-start;
    padding: 30px;
    box-shadow: 0 2px 10px rgba(0,0,0,.1);
    margin-bottom: 25px;
}

.box h2 {
    font-size: 1.3rem;
    color: var(--primary);
    margin-bottom: 20px;
    text-transform: uppercase;
}

/* ADDRESS LIST */
.address-item {
    border: 2px solid #ddd;
    border-radius: 6px;
    padding: 18px;
    margin-bottom: 15px;
}

.address-item.active {
    border-color: var(--highlight);
}

.address-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
}

.address-name {
    font-weight: 700;
}

.address-tag {
    background: #eee;
    font-size: 11px;
    padding: 2px 6px;
}

.address-text {
    font-size: 14px;
    color: #555;
    margin-bottom: 12px;
}

.deliver-btn {
    background: var(--highlight);
    color: #fff;
    border: none;
    padding: 10px 24px;
    font-weight: 700;
    cursor: pointer;
}

/* ADD NEW ADDRESS */
.add-address {
    border: 2px dashed var(--secondary);
    padding: 18px;
    border-radius: 6px;
    text-align: center;
    cursor: pointer;
    font-weight: 700;
    color: var(--secondary);
}

/* PAYMENT */
.payment-option {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px;
    border: 1px solid #ddd;
    border-radius: 6px;
    margin-bottom: 12px;
}

/* SUMMARY */
.summary-row {
    display: flex;
    justify-content: space-between;
    padding: 12px 0;
    font-size: .95rem;
}

.summary-row:not(:last-child) {
    border-bottom: 1px solid #eee;
}

.summary-row.total {
    border-top: 2px solid #ddd;
    margin-top: 15px;
    padding-top: 15px;
    font-size: 1.2rem;
    font-weight: 700;
}

.place-order {
    width: 100%;
    margin-top: 25px;
    padding: 15px;
    background: var(--secondary);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
}

.place-order:hover {
    background: var(--primary);
}

/* RESPONSIVE */
@media (max-width: 992px) {
    .checkout-container {
        grid-template-columns: 1fr;
    }
}
.add-address-box {
    border: 2px dashed var(--secondary);
    border-radius: 6px;
    padding: 15px;
}

.add-address-title {
    font-weight: 700;
    color: var(--secondary);
    cursor: pointer;
    list-style: none;
}

.add-address-box summary::-webkit-details-marker {
    display: none;
}

.address-form {
    margin-top: 20px;
}


.address-form input,
.address-form textarea,
.address-form select {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border: 1px solid #ccc;
    border-radius: 4px;
}

.address-form textarea {
    height: 90px;
    resize: none;
}

.form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.address-type {
    display: flex;
    gap: 20px;
    margin: 15px 0;
    font-size: 14px;
}

.form-actions {
    display: flex;
    gap: 20px;
    align-items: center;
    
}

.save-btn {
    background:  #8b7355;
    color: #fff;
    border: none;
    padding: 14px 28px;
    font-weight: 700;
    cursor: pointer;
}

.cancel-btn {
    background: none;
    border: none;
    color: #8b7355;
    font-weight: 700;
    cursor: pointer;
}
/* HEADER */
        .page-title-section {
            background-color:#fff;
            padding: 20px 0;
            text-align: center;
        }
        .page-title {
            font-size: 50px;
            font-weight: 70;
            text-decoration: none;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 3px;
        }
</style>
</head>

<body>

<!-- HEADER -->
<section class="page-title-section">
    <a href="/" class="page-title">HOME BLOOM</a>
</section>

<div class="checkout-container">

    <!-- LEFT -->
    <div>

        <!-- DELIVERY ADDRESS -->
        <div class="box">
            <h2>Select Delivery Address</h2>

            <div class="address-item active">
                <div class="address-header">
                    <input type="radio" checked>
                    <span class="address-name">Gopika</span>
                    <span class="address-tag">HOME</span>
                </div>
                <div class="address-text">
                    Payyavoor, Kannur, Kerala – 670633<br>
                    Phone: 7559922317
                </div>
                <button class="deliver-btn">DELIVER HERE</button>
            </div>

            <details class="add-address-box">
    <summary class="add-address-title">
        + ADD A NEW ADDRESS
    </summary>

    <div class="address-form">
        <div class="form-row">
            <input type="text" placeholder="Name">
            <input type="text" placeholder="10-digit mobile number">
        </div>

        <div class="form-row">
            <input type="text" placeholder="Pincode">
            <input type="text" placeholder="Locality">
        </div>

        <textarea placeholder="Address (Area and Street)"></textarea>

        <div class="form-row">
            <input type="text" placeholder="City/District/Town">
            <select>
                <option>-- Select State --</option>
                <option>Kerala</option>
                <option>Tamil Nadu</option>
                <option>Karnataka</option>
            </select>
        </div>

        <div class="form-row">
            <input type="text" placeholder="Landmark (Optional)">
            <input type="text" placeholder="Alternate Phone (Optional)">
        </div>

        <div class="form-actions">
            <button class="save-btn">SAVE AND DELIVER HERE</button>
            <button class="cancel-btn" type="button">CANCEL</button>
        </div>

    </div>
</details>

        </div>

        <!-- PAYMENT -->
        <div class="box">
            <h2>Payment Method</h2>

            <div class="payment-option">
                <input type="radio" name="payment" checked>
                <span>Cash on Delivery</span>
            </div>

            <div class="payment-option">
                <input type="radio" name="payment">
                <span>UPI / Card / Net Banking</span>
            </div>
        </div>

    </div>

    <!-- RIGHT -->
    <div class="box">
        <h2>Order Summary</h2>

        <div class="summary-row">
            <span>Items</span>
            <span>8</span>
        </div>

        <div class="summary-row">
            <span>Subtotal</span>
            <span>$708.00</span>
        </div>

        <div class="summary-row">
            <span>Shipping</span>
            <span>$0.00</span>
        </div>

        <div class="summary-row">
            <span>Discount</span>
            <span>-$100.00</span>
        </div>

        <div class="summary-row total">
            <span>Total</span>
            <span>$633.00</span>
        </div>

        <button class="place-order">
            <i class="bi bi-bag-check"></i> Place Order
        </button>
    </div>

</div>

</body>
</html>
