<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Wishlist | HOUSE BLOOM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.1/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Georgia", serif;
        }

        :root {
            --primary-color: #8B6F47;
            --accent-color: #3f3007;
            --bg-light: #e4d1bb;
            --text-dark: #333;
        }

        body {
            background: var(--bg-light);
        }

       .logo-section {
    padding: 15px 0 15px; 
    display: flex;
    justify-content: center;
    background-color: #fff;
}

.logo {
    max-width: 250px;    
    width: 100%;
    height: auto;
}
        .wishlist-container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .wishlist-header h1 {
            font-size: 28px;
            margin-bottom: 30px;
            color: var(--text-dark);
        }

        .wishlist-header span {
            color: var(--primary-color);
            font-weight: normal;
        }

        .wishlist-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
        }

        .wishlist-card {
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .card-image-wrapper {
            position: relative;
            height: 320px;
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .remove-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 36px;
            height: 36px;
            background: white;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .remove-btn i {
            font-size: 20px;
            color: var(--accent-color);
        }

        .card-info {
            padding: 18px;
        }

        .product-name {
            font-size: 16px;
            margin-bottom: 12px;
            color: var(--text-dark);
        }

        .price {
            font-size: 20px;
            font-weight: bold;
            color: var(--accent-color);
        }

        .view-btn {
            margin-top: 15px;
            display: block;
            text-align: center;
            padding: 12px;
            background: var(--primary-color);
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
        }

        .view-btn:hover {
            background: var(--accent-color);
        }

        .empty-wishlist {
            text-align: center;
            padding: 100px 20px;
        }

        .empty-wishlist i {
            font-size: 80px;
            color: var(--primary-color);
        }

        .empty-wishlist h2 {
            margin-top: 20px;
            font-size: 28px;
        }

        @media (max-width: 992px) {
            .wishlist-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 576px) {
            .wishlist-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<section class="logo-section">
    <a href="/">
    <img src="/media/logo1.png" alt="House Bloom Logo" class="logo">
    </a>
</section>

<div class="wishlist-container">

    <!-- HEADER -->
    <div class="wishlist-header">
        <h1>
            My Wishlist
            <span>({{ wishlist_items|length }} items)</span>
        </h1>
    </div>

    <!-- GRID -->
    <div class="wishlist-grid">

        {% for item in wishlist_items %}
        <div class="wishlist-card">

            <div class="card-image-wrapper">
                <img src="{{ item.product.image1.url }}"
                     alt="{{ item.product.name }}"
                     class="card-image">

                <!-- REMOVE -->
                <form method="POST"
                      action="{% url 'toggle_wishlist' item.product.id %}">
                    {% csrf_token %}
                    <button type="submit" class="remove-btn">
                        <i class="bi bi-x"></i>
                    </button>
                </form>
            </div>
            
            <div class="card-info">
                <h3 class="product-name">{{ item.product.name }}</h3>
                <div class="price">₹{{ item.product.price }}</div>

                <a href="{% url 'move_to_cart' item.product.id %}" class="view-btn">Move to cart</a>

            </div>

        </div>
        {% empty %}
        <div class="empty-wishlist">
            <i class="bi bi-heart"></i>
            <h2>Your wishlist is empty</h2>
        </div>
        {% endfor %}

    </div>
</div>

</body>
</html>
