<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Category | Admin Dashboard | HOME BLOOM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#f4f1ec;
}

.dashboard-wrapper{
    display:flex;
    min-height:100vh;
}

/* SIDEBAR */
.sidebar{
    width:240px;
    background:#3f3007;
    color:#fff;
    padding:30px 20px;
}

.brand{
    font-size:1.4rem;
    letter-spacing:2px;
    margin-bottom:40px;
}

.sidebar nav a{
    display:block;
    color:#ddd;
    text-decoration:none;
    padding:12px 15px;
    border-radius:8px;
    margin-bottom:10px;
}

.sidebar nav a:hover,
.sidebar nav a.active{
    background:#8B6F47;
    color:#fff;
}

.logout{
    margin-top:30px;
    background:#2b2205;
}

/* MAIN */
.main-content{
    flex:1;
    padding:30px 40px;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.top-bar h1{
    font-size:1.8rem;
    color:#3f3007;
}

.admin-info{
    background:#fff;
    padding:10px 18px;
    border-radius:10px;
    box-shadow:0 4px 12px rgba(0,0,0,.1);
}

/* FORM */
.form-wrapper{
    background:#fff;
    padding:30px;
    border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
    max-width:650px;
}

.form-wrapper h2{
    margin-bottom:20px;
    color:#3f3007;
}

.form-group{
    margin-bottom:18px;
    display:flex;
    flex-direction:column;
}

.form-group label{
    font-size:0.9rem;
    color:#555;
    margin-bottom:6px;
}

.form-group input{
    padding:10px 14px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:0.9rem;
    width:100%;
}

.sub-row{
    display:flex;
    gap:10px;
}

.submit-btn{
    padding:10px 18px;
    background:#8B6F47;
    color:#fff;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:0.9rem;
}

.submit-btn:hover{
    background:#6b5234;
}

.delete-btn{
    background:#c0392b;
}

.delete-btn:hover{
    background:#a93226;
}

@media(max-width:576px){
    .sidebar{
        display:none;
    }
}
</style>
</head>
<body>

<div class="dashboard-wrapper">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2 class="brand">HOME BLOOM</h2>
        <nav>
            <a href="{% url 'admindashboard' %}">Dashboard</a>
            <a href="{% url 'adminproduct' %}">Products</a>
            <a href="{% url 'adminorder' %}">Orders</a>
            <a href="{% url 'admincustomer' %}">Customers</a>
            <a href="{% url 'admincategory' %}" class="active">Categories</a>
            <a href="{% url 'admincoupon' %}">Coupons</a>
            <a href="{% url 'addproduct' %}">Add Product</a>
            <a href="/" class="logout">Logout</a>
        </nav>
    </aside>

    <!-- MAIN -->
    <main class="main-content">

        <div class="top-bar">
            <h1>Edit Category</h1>
            <div class="admin-info">Admin</div>
        </div>

        <div class="form-wrapper">
            <h2>Update Category</h2>

            <form method="post">
                {% csrf_token %}

                <!-- CATEGORY NAME -->
                <div class="form-group">
                    <label>Category Name</label>
                    <input type="text" name="category_name"
                           value="{{ category.name }}" required>
                </div>

                <hr style="margin:25px 0;">

                <!-- SUBCATEGORIES -->
                <h3 style="margin-bottom:15px;">Subcategories</h3>

                {% for sub in subcategories %}
                <div class="form-group">
                    <div class="sub-row">
                        <input type="text"
                               name="sub_{{ sub.id }}"
                               value="{{ sub.name }}"
                               placeholder="Subcategory name">

                        <button type="submit"
                                name="delete_sub"
                                value="{{ sub.id }}"
                                class="submit-btn delete-btn">
                            Delete
                        </button>
                    </div>
                </div>
                {% empty %}
                <p style="color:#777;">No subcategories available.</p>
                {% endfor %}

                <!-- ADD NEW -->
                <div class="form-group">
                    <label>Add New Subcategory</label>
                    <input type="text" name="new_subcategory"
                           placeholder="Enter new subcategory">
                </div>

                <button type="submit" class="submit-btn">
                    Update Category
                </button>

            </form>
        </div>

    </main>
</div>

</body>
</html>
