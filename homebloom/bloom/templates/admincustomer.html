<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Customers | Admin Dashboard | HOME BLOOM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#f4f1ec;
}

.dashboard-wrapper{
    display:flex;
    min-height:100vh;
}

/* SIDEBAR */
.sidebar{
    width:240px;
    background:#3f3007;
    color:#fff;
    padding:30px 20px;
}

.brand{
    font-size:1.4rem;
    letter-spacing:2px;
    margin-bottom:40px;
}

.sidebar nav a{
    display:block;
    color:#ddd;
    text-decoration:none;
    padding:12px 15px;
    border-radius:8px;
    margin-bottom:10px;
}

.sidebar nav a:hover,
.sidebar nav a.active{
    background:#8B6F47;
    color:#fff;
}

.logout{
    margin-top:30px;
    background:#2b2205;
}

/* MAIN */
.main-content{
    flex:1;
    padding:30px 40px;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.top-bar h1{
    font-size:1.8rem;
    color:#3f3007;
}

.admin-info{
    background:#fff;
    padding:10px 18px;
    border-radius:10px;
    box-shadow:0 4px 12px rgba(0,0,0,.1);
}

/* SEARCH */
.search-wrapper{
    margin-bottom:20px;
    display:flex;
    justify-content:flex-end;
    gap:10px;
}

.search-input{
    padding:10px 14px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:0.9rem;
    width:250px;
}

.search-btn{
    padding:10px 18px;
    border-radius:10px;
    border:none;
    background:#8B6F47;
    color:#fff;
    font-size:0.9rem;
    cursor:pointer;
}

/* TABLE */
.table-wrapper{
    background:#fff;
    border-radius:16px;
    padding:25px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:800px;
}

th,td{
    padding:14px;
    text-align:left;
    border-bottom:1px solid #e0e0e0;
    font-size:0.9rem;
}

th{
    color:#777;
    font-weight:500;
}

.block-toggle{
    display:inline-block;
    position:relative;
}

.block-toggle input[type="checkbox"]{
    display:none;
}

.block-toggle label{
    display:inline-block;
    min-width:80px;
    text-align:center;
    padding:6px 12px;
    border-radius:8px;
    cursor:pointer;
    background:#b3261e;
    color:#fff;
    font-size:0.85rem;
    transition:0.3s;
}

/* Default text */
.block-toggle label::after{
    content:"Block";
}

/* When checked, change background + text */
.block-toggle input[type="checkbox"]:checked + label{
    background:#8B6F47;
}

.block-toggle input[type="checkbox"]:checked + label::after{
    content:"Unblock";
}


/* Responsive */
@media(max-width:576px){
    .sidebar{
        display:none;
    }
}
.delete-btn {
    background-color: #d32f2f; /* red for delete */
    color: #fff;
    border: none;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: background 0.3s;
}

.delete-btn:hover {
    background-color: #b71c1c; /* darker red on hover */
}   
</style>
</head>
<body>

<div class="dashboard-wrapper">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2 class="brand">HOME BLOOM</h2>
        <nav>
            <a href="{% url 'admindashboard' %}">Dashboard</a>
            <a href="{%url 'adminproduct'%}">Products</a>
            <a href="{% url 'adminorder' %}">Orders</a>
             <a href="{%url 'admincustomer'%}"class="active">Customers</a>
            <a href="{%url 'admincategory'%}">Categories</a>
            <a href="{%url 'admincoupon'%}">Coupons</a>
            <a href="{%url 'addproduct'%}">Add Product</a>
            <a href="/" class="logout">Logout</a>
        </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

        <div class="top-bar">
            <h1>Customers</h1>
            <div class="admin-info">Admin</div>
        </div>

        <!-- SEARCH -->
        <div class="search-wrapper">
            <form method="get" action="{% url 'admincustomer' %}">
                <input type="text" name="q" placeholder="Search customers..." class="search-input">
                <button type="submit" class="search-btn">Search</button>
            </form>
        </div>

        <!-- CUSTOMER TABLE -->
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
    {% for user in customers %}
    <tr>
        <td>{{ user.id }}</td>
        <td>{{ user.username }}</td>
        <td>{{ user.email }}</td>
        <td>
    <!-- Block/Unblock -->
    <div class="block-toggle">
        <input type="checkbox" id="block{{ user.id }}">
        <label for="block{{ user.id }}"></label>
    </div>

    <!-- Delete Button -->
  <form action="{% url 'delete_customer' user.id %}" method="post" style="display:inline;">
    {% csrf_token %}
    <button type="submit" class="delete-btn">Delete</button>
</form>

</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="4">No customers found</td>
    </tr>
    {% endfor %}
</tbody>
            </table>
        </div>

    </main>
</div>

</body>
</html>
