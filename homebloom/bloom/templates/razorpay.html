<!DOCTYPE html>
<html>
<head>
  <title>Pay with Razorpay</title>
</head>
<body>

<h2>Redirecting to payment…</h2>
<button id="rzp-btn">Pay ₹{{ total }}</button>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
var options = {
  "key": "rzp_test_XXXXXXX",
  "amount": "{{ total|floatformat:0 }}00",
  "currency": "INR",
  "name": "HOME BLOOM",
  "description": "Order Payment",
  "handler": function (response) {
      window.location.href = "/payment-success/?pid=" + response.razorpay_payment_id;
  }
};

var rzp = new Razorpay(options);
document.getElementById("rzp-btn").onclick = function(e){
  rzp.open();
  e.preventDefault();
};
</script>

</body>
</html>
