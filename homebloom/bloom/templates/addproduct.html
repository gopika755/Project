<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Product | Admin Dashboard | HOUSE BLOOM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#f4f1ec;
}

.dashboard-wrapper{
    display:flex;
    min-height:100vh;
}

/* SIDEBAR */
.sidebar{
    width:240px;
    background:#3f3007;
    color:#fff;
    padding:30px 20px;
}

.brand{
    font-size:1.4rem;
    letter-spacing:2px;
    margin-bottom:40px;
}

.sidebar nav a{
    display:block;
    color:#ddd;
    text-decoration:none;
    padding:12px 15px;
    border-radius:8px;
    margin-bottom:10px;
}

.sidebar nav a:hover,
.sidebar nav a.active{
    background:#8B6F47;
    color:#fff;
}

.logout{
    margin-top:30px;
    background:#2b2205;
}

/* MAIN */
.main-content{
    flex:1;
    padding:30px 40px;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.top-bar h1{
    font-size:1.8rem;
    color:#3f3007;
}

.admin-info{
    background:#fff;
    padding:10px 18px;
    border-radius:10px;
    box-shadow:0 4px 12px rgba(0,0,0,.1);
}

/* FORM CARD */
.form-card{
    background:#fff;
    border-radius:16px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
    max-width:900px;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.form-group{
    display:flex;
    flex-direction:column;
    margin-bottom:20px;
}

.form-group label{
    font-size:0.85rem;
    color:#555;
    margin-bottom:6px;
    font-weight:500;
}

.form-group input,
.form-group select,
.form-group textarea{
    padding:12px 14px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:0.9rem;
}

.form-group textarea{
    resize:none;
    height:120px;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus{
    outline:none;
    border-color:#8B6F47;
}

/* IMAGE UPLOAD */
.image-grid{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:15px;
}

.image-grid input[type="file"]{
    width:100%;
    max-width:100%;
    padding:8px;
    font-size:0.8rem;
    border-radius:10px;
    border:1px solid #ccc;
    background:#fafafa;
    box-sizing:border-box;
}

/* BUTTONS */
.form-actions{
    margin-top:30px;
    display:flex;
    gap:15px;
}

.btn{
    padding:12px 22px;
    border-radius:10px;
    border:none;
    cursor:pointer;
    font-size:0.9rem;
    font-weight:500;
}

.btn-save{
    background:#8B6F47;
    color:#fff;
}

.btn-save:hover{
    background:#6d5838;
}

.btn-cancel{
    background:#e0e0e0;
    color:#333;
    text-decoration:none;
    display:inline-block;
    text-align:center;
}

.btn-cancel:hover{
    background:#d0d0d0;
}

.load-btn{
    background:#5a4a2f;
    color:#fff;
    margin-top:10px;
    padding:10px 20px;
}

.error{
    color:#d32f2f;
    font-size:0.85rem;
    margin-top:10px;
}

@media(max-width:768px){
    .form-grid{
        grid-template-columns:1fr;
    }

    .image-grid{
        grid-template-columns:1fr 1fr;
    }

    .sidebar{
        display:none;
    }
}
</style>
</head>
<body>

<div class="dashboard-wrapper">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2 class="brand">HOME BLOOM</h2>
        <nav>
            <a href="{% url 'admindashboard' %}">Dashboard</a>
            <a href="{% url 'adminproduct' %}">Products</a>
            <a href="{% url 'adminorder' %}">Orders</a>
            <a href="{% url 'admincustomer' %}">Customers</a>
            <a href="{% url 'admincategory' %}">Categories</a>
            <a href="{% url 'admincoupon' %}">Coupons</a>
            <a href="{% url 'addproduct' %}" class="active">Add Product</a>
            <a href="/" class="logout">Logout</a>
        </nav>
    </aside>

    <!-- MAIN -->
    <main class="main-content">

        <div class="top-bar">
            <h1>Add Product</h1>
            <div class="admin-info">Admin</div>
        </div>

        <div class="form-card">
 <form method="post" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="form-grid">

        <!-- Product Name -->
        <div class="form-group">
            <label>Product Name</label>
            <input type="text" name="name" required
                   value="{{ form_data.name }}">
        </div>

        <!-- Category -->
        <div class="form-group">
            <label>Category</label>
            <select name="category" required onchange="this.form.submit()">
                <option value="">Select category</option>
                {% for cat in categories %}
                    <option value="{{ cat.id }}"
                        {% if selected_category_id == cat.id|stringformat:"s" %}selected{% endif %}>
                        {{ cat.name }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <!-- SubCategory -->
        <div class="form-group">
            <label>SubCategory</label>
            <select name="subcategory" required
                {% if not subcategories %}disabled{% endif %}>
                <option value="">Select subcategory</option>
                {% for sub in subcategories %}
                    <option value="{{ sub.id }}">{{ sub.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Sales Price</label>
            <input type="number" name="price" required
                   value="{{ form_data.price }}">
        </div>

        <div class="form-group">
            <label>Offer Price</label>
            <input type="number" name="offer_price"
                   value="{{ form_data.offer_price }}">
        </div>

        <div class="form-group">
            <label>Quantity</label>
            <input type="number" name="quantity" required
                   value="{{ form_data.quantity }}">
        </div>

        <div class="form-group">
            <label>Offer Percentage</label>
            <input type="number" name="offer"
                   value="{{ form_data.offer }}">
        </div>
    </div>

    <div class="form-group" style="margin-top:20px;">
        <label>Description</label>
        <textarea name="description">{{ form_data.description }}</textarea>
    </div>

    <div class="form-group" style="margin-top:20px;">
        <label>Product Images</label>
        <div class="image-grid">
            <input type="file" name="image1">
            <input type="file" name="image2">
            <input type="file" name="image3">
            <input type="file" name="image4">
        </div>
    </div>

    <div class="form-actions">
        <button type="submit" name="submit_product"
                class="btn btn-save"
                {% if not subcategories %}disabled{% endif %}>
            Add Product
        </button>

        <a href="{% url 'adminproduct' %}" class="btn btn-cancel">Cancel</a>
    </div>
</form>

        </div>

    </main>
</div>

</body>
</html>
