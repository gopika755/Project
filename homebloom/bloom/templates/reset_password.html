<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password | HOME BLOOM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body { margin: 0; }
        /* SAME STYLES – keep consistent */
    </style>
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-box">

        <div class="auth-left">
            <h2>Reset Password</h2>
            <p>Create a new password for your account.</p>

            <form method="POST">
  {% csrf_token %}

  {% if form.errors %}
    <div class="alert alert-danger">{{ form.errors }}</div>
  {% endif %}

  <div class="form-group">
    <label>New Password</label>
    {{ form.password1 }}
  </div>

  <div class="form-group">
    <label>Confirm Password</label>
    {{ form.password2 }}
  </div>

  <button type="submit">Change Password</button>
</form>

        </div>

        <div class="auth-right">
            <h3>HOME BLOOM</h3>
            <p>Secure access for a beautiful home.</p>
        </div>

    </div>
</div>

</body>
</html>
