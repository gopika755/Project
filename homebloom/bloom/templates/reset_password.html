<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password | HOME BLOOM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #e4d1bb;
}

/* WRAPPER */
.auth-wrapper {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* MAIN CARD */
.auth-box {
    display: flex;
    width: 850px;
    background: #fff;
    box-shadow: 0 20px 50px rgba(0,0,0,0.15);
    border-radius: 16px;
    overflow: hidden;
}

/* LEFT SIDE (FORM) */
.auth-left {
    width: 50%;
    padding: 60px 50px;
}

.auth-left h2 {
    color: #3f3007;
    font-size: 28px;
    margin-bottom: 10px;
}

.auth-left p {
    color: #666;
    font-size: 14px;
    margin-bottom: 30px;
}

/* FORM */
.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #3f3007;
    margin-bottom: 6px;
}

.form-group input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #cbb79c;
    font-size: 14px;
    outline: none;
}

.form-group input:focus {
    border-color: #8B6F47;
    box-shadow: 0 0 0 2px rgba(212, 160, 87, 0.15);
}

/* ERROR BOX */
.alert {
    background: #f8d7da;
    color: #721c24;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 20px;
}

/* SUBMIT BUTTON */
button {
    width: 100%;
    padding: 14px;
    background: #8B6F47;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    transition: background 0.3s ease, transform 0.2s ease;
}

button:hover {
    background: #3f3007;
    transform: translateY(-1px);
}

/* RIGHT SIDE */
.auth-right {
    width: 50%;
    background: linear-gradient(135deg, #8B6F47, #8d7d52);
    color: #fff;
    padding: 60px 50px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.auth-right h3 {
    font-size: 32px;
    letter-spacing: 3px;
    margin-bottom: 15px;
}

.auth-right p {
    font-size: 14px;
    opacity: 0.9;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .auth-box {
        flex-direction: column;
        width: 90%;
    }

    .auth-left,
    .auth-right {
        width: 100%;
        padding: 40px 30px;
    }

    .auth-right {
        text-align: center;
    }
}

    </style>
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-box">

        <div class="auth-left">
            <h2>Reset Password</h2>
            <p>Create a new password for your account.</p>

            <form method="POST">
  {% csrf_token %}

  {% if form.errors %}
    <div class="alert alert-danger">{{ form.errors }}</div>
  {% endif %}

  <div class="form-group">
    <label>New Password</label>
    {{ form.password1 }}
  </div>

  <div class="form-group">
    <label>Confirm Password</label>
    {{ form.password2 }}
  </div>

  <button type="submit">Change Password</button>
</form>

        </div>

        <div class="auth-right">
            <h3>HOME BLOOM</h3>
            <p>Secure access for a beautiful home.</p>
        </div>

    </div>
</div>

</body>
</html>
