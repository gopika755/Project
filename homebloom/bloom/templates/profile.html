<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile | Home Bloom</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Georgia", serif;
        }

        body {
            background: #e7d6c1;
        }

        /* ===== PAGE TITLE ===== */
        .page-title-section {
            padding: 15px 0;
            text-align: center;
        }

        .page-title {
            font-size: 3rem;
            font-weight: 70;
            text-decoration: none;
            color: #8b7355;
            letter-spacing: 3px;
        }

        /* ===== LAYOUT ===== */
        .profile-wrapper {
            min-height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-card {
            width: 900px;
            background: #fff;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            padding: 60px;
        }

        /* ===== PROFILE HEADER ===== */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 40px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 40px;
        }

        .profile-image {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #8b7355;
        }

        .profile-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-info h2 {
            margin-bottom: 10px;
        }

        .profile-info p {
            font-size: 14px;
            margin-bottom: 6px;
        }
        
        /* ===== ADDRESS SECTION ===== */
        .address-section {
            margin-top: 40px;
        }

        .address-section h3 {
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .address-box {
            border: 1px solid #ccc;
            padding: 25px;
            margin-bottom: 25px;
            background: #fafafa;
        }

        .address-box p {
            font-size: 14px;
            margin-bottom: 8px;
        }

        /* ===== BUTTON ===== */
        .add-address-btn {
            display: inline-block;
            padding: 12px 28px;
            background: #8b7355;
            color: #fff;
            text-decoration: none;
            letter-spacing: 2px;
            font-size: 14px;
        }

        .add-address-btn:hover {
            background: #6f5a41;
        }
    </style>
</head>

<body>

    <!-- PAGE TITLE -->
    <section class="page-title-section">
        <a href="/" class="page-title">HOME BLOOM</a>
    </section>
    
    <!-- PROFILE OVERVIEW -->
    <div class="profile-wrapper">
        <div class="profile-card">

            <!-- PROFILE HEADER -->
            <div class="profile-header">
                <div class="profile-image">
                    <img src="https://via.placeholder.com/150" alt="Profile Image">
                </div>

                <div class="profile-info">
                    <h2>John Doe</h2>
                    <p>Email: johndoe@gmail.com</p>
                    <p>Phone: +91 98765 43210</p>
                </div>
            </div>

            <!-- ADDRESS -->
            <div class="address-section">
                <h3>Saved Address</h3>

                <div class="address-box">
                    <p><strong>Full Name:</strong> John Doe</p>
                    <p><strong>Email:</strong> johndoe@gmail.com</p>
                    <p><strong>Phone:</strong> +91 98765 43210</p>
                    <p><strong>Address:</strong>  
                        12, Rose Garden Street,  
                        Anna Nagar, Chennai,  
                        Tamil Nadu – 600040
                    </p>
                </div>

                <a href="{%url 'addaddress'%}" class="add-address-btn">
                    ADD NEW ADDRESS
                </a>
            </div>

        </div>
    </div>

</body>
</html>
