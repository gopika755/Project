<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment | HOME BLOOM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.1/font/bootstrap-icons.min.css" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Georgia", serif;
}

body{
    background:#e4d1bbff;
}

/* HEADER */
.page-title-section{
    background:#fff;
    padding:20px 0;
    text-align:center;
    margin-bottom:25px;
}
.page-title{
    font-size:50px;
    text-decoration:none;
    color:#855317ff;
    letter-spacing:3px;
}

/* LAYOUT */
.payment-container{
    max-width:900px;
    margin:auto;
    padding:0 20px 60px;
}

/* BOX */
.box{
    background:#fff;
    padding:30px;
    border-radius:8px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
    margin-bottom:25px;
}

.box h2{
    font-size:1.3rem;
    color:#8b7355;
    margin-bottom:20px;
    text-transform:uppercase;
}

/* PAYMENT OPTIONS */
.payment-option{
    border:2px solid #ddd;
    border-radius:6px;
    padding:18px;
    margin-bottom:15px;
    display:flex;
    gap:12px;
    align-items:flex-start;
}

.payment-option input{
    margin-top:4px;
}

.payment-title{
    font-weight:700;
    color:#333;
}

.payment-desc{
    font-size:14px;
    color:#555;
}

/* ORDER SUMMARY */
.summary-row{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
}

.total{
    font-weight:700;
    font-size:18px;
}

/* BUTTON */
.place-order{
    display:inline-block;
    width:100%;
    padding:14px;
    background:#8B6F47;
    color:#fff;
    text-decoration:none;
    border-radius:6px;
    font-size:16px;
    font-weight:700;
    text-align:center;
    border:none;
    cursor:pointer;
}
.place-order i{
    margin-right:6px;
}

/* DISABLED */
.disabled{
    opacity:.5;
}
</style>
</head>

<body>

<!-- HEADER -->
<section class="page-title-section">
    <a href="/" class="page-title">HOME BLOOM</a>
</section>

<form method="post" action="{% url 'ordersuccess' %}">
{% csrf_token %}

<div class="payment-container">

<!-- PAYMENT METHODS -->
<div class="box">
<h2>Select Payment Method</h2>

<label class="payment-option">
    <input type="radio" name="payment_method" value="COD" required>
    <div>
        <div class="payment-title">
            <i class="bi bi-cash-coin"></i> Cash on Delivery
        </div>
        <div class="payment-desc">
            Pay with cash when your order is delivered.
        </div>
    </div>
</label>

<label class="payment-option">
    <input type="radio" name="payment_method" value="RAZORPAY" required>
    <div>
        <div class="payment-title">
            <i class="bi bi-credit-card"></i> Online Payment (Razorpay)
        </div>
        <div class="payment-desc">
            Pay using UPI, Debit/Credit Card, Netbanking.
        </div>
    </div>
</label>

</div>

<!-- ORDER SUMMARY -->
<div class="box">
<h2>Order Summary</h2>

<div class="summary-row">
    <span>Subtotal</span>
    <span>₹{{ total }}</span>
</div>

<div class="summary-row total">
    <span>Total Payable</span>
    <span>₹{{ total }}</span>
</div>

</div>

<button type="submit" class="place-order">
    <i class="bi bi-bag-check"></i> Place Order
</button>

</div>
</form>

</body>
</html>
