<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Coupon | Admin Dashboard | HOUSE BLOOM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Jost', sans-serif;
}

body{
    background:#f4f1ec;
}

.dashboard-wrapper{
    display:flex;
    min-height:100vh;
}

/* SIDEBAR */
.sidebar{
    width:240px;
    background:#3f3007;
    color:#fff;
    padding:30px 20px;
}

.brand{
    font-size:1.4rem;
    letter-spacing:2px;
    margin-bottom:40px;
}

.sidebar nav a{
    display:block;
    color:#ddd;
    text-decoration:none;
    padding:12px 15px;
    border-radius:8px;
    margin-bottom:10px;
}

.sidebar nav a:hover,
.sidebar nav a.active{
    background:#8B6F47;
    color:#fff;
}

.logout{
    margin-top:30px;
    background:#2b2205;
}

/* MAIN */
.main-content{
    flex:1;
    padding:30px 40px;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.top-bar h1{
    font-size:1.8rem;
    color:#3f3007;
}

.admin-info{
    background:#fff;
    padding:10px 18px;
    border-radius:10px;
    box-shadow:0 4px 12px rgba(0,0,0,.1);
}

/* FORM */
.form-wrapper{
    background:#fff;
    padding:30px;
    border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
    max-width:900px;
}

.form-wrapper h2{
    margin-bottom:20px;
    color:#3f3007;
}

.form-group{
    margin-bottom:18px;
    display:flex;
    flex-direction:column;
}

.form-group label{
    font-size:0.9rem;
    color:#555;
    margin-bottom:6px;
}

.form-group input,
.form-group select{
    padding:10px 14px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:0.9rem;
    width:100%;
}

.update-btn{
    padding:10px 20px;
    background:#8B6F47;
    color:#fff;
    text-decoration:none;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:0.95rem;
    transition:0.3s;
}

.update-btn:hover{
    background:#6b5234;
}

/* Responsive */
@media(max-width:576px){
    .sidebar{
        display:none;
    }
}
</style>
</head>
<body>

<div class="dashboard-wrapper">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2 class="brand">HOME BLOOM</h2>
        <nav>
            <a href="{% url 'admindashboard' %}">Dashboard</a>
            <a href="{%url 'adminproduct'%}">Products</a>
            <a href="{% url 'adminorder' %}">Orders</a>
             <a href="{%url 'admincustomer'%}">Customers</a>
            <a href="{%url 'admincategory'%}">Categories</a>
            <a href="{%url 'admincoupon'%}">Coupons</a>
            <a href="{%url 'addproduct'%}">Add Product</a>
            <a href="/" class="logout">Logout</a>
        </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

        <div class="top-bar">
            <h1>Edit Coupon</h1>
            <div class="admin-info">Admin</div>
        </div>

        <div class="form-wrapper">
            <h2>Update Coupon Details</h2>
            <form>
                <div class="form-group">
                    <label for="code">Coupon Code</label>
                    <input type="text" id="code" name="code" value="WELCOME10" required>
                </div>
                <div class="form-group">
                    <label for="type">Discount Type</label>
                    <select id="type" name="type">
                        <option value="flat" selected>Flat</option>
                        <option value="percentage">Percentage</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="value">Discount Value</label>
                    <input type="number" id="value" name="value" value="100" required>
                </div>
                <div class="form-group">
                    <label for="min-order">Minimum Order Value</label>
                    <input type="number" id="min-order" name="min-order" value="500" required>
                </div>
                <div class="form-group">
                    <label for="start-date">Start Date</label>
                    <input type="date" id="start-date" name="start-date" value="2025-12-01" required>
                </div>
                <div class="form-group">
                    <label for="end-date">End Date</label>
                    <input type="date" id="end-date" name="end-date" value="2025-12-31" required>
                </div>
                <div class="form-group">
                    <label for="max-discount">Maximum Discount</label>
                    <input type="number" id="max-discount" name="max-discount" value="200" required>
                </div>
                <a href="{%url 'admincoupon'%}" type="submit" class="update-btn">Update Coupon</a>
            </form>
        </div>

    </main>
</div>

</body>
</html>
