<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up | HOME BLOOM</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">

<style>
:root{
--primary:#8B6F47;
--accent:#3f3007;
--bg:#e4d1bb;
--light:#dbc7ad;
--text:#333;
}

body{
font-family:Georgia,serif;
background:var(--bg);
color:var(--text);
}

/* PAGE WRAPPER */
.auth-wrapper{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:40px 15px;
}

/* CARD */
.auth-card{
background:#fff;
width:100%;
max-width:1100px;
display:grid;
grid-template-columns:1fr 1fr;
border-radius:6px;
overflow:hidden;
box-shadow:0 10px 40px rgba(0,0,0,.15);
}

/* LEFT – SIGN UP */
.auth-left{
padding:50px;
}

.auth-left h2{
font-size:1.6rem;
letter-spacing:2px;
margin-bottom:30px;
text-transform:uppercase;
}

.form-group{
margin-bottom:18px;
}

.form-group label{
font-weight:600;
margin-bottom:6px;
display:block;
}

.form-group input{
width:100%;
padding:10px 12px;
border:1px solid #bbb;
border-radius:2px;
}

/* TERMS */
.terms{
font-size:.9rem;
margin:20px 0;
display:flex;
gap:10px;
align-items:flex-start;
}

.terms input{
margin-top:4px;
}

.terms a{
color:var(--primary);
text-decoration:none;
}

/* SIGN UP BUTTON */
.signup-btn{
width:100%;
padding:14px;
background: #8b7355;
color:#fff;
border:none;
letter-spacing:2px;
font-weight:600;
}

/* RIGHT – LOGIN CTA */
.auth-right{
background:#faf7f3;
padding:50px;
border-left:1px solid #ddd;
}

.auth-right h3{
font-size:1.2rem;
letter-spacing:2px;
margin-bottom:20px;
text-transform:uppercase;
}

.auth-right p{
font-size:.95rem;
line-height:1.7;
margin-bottom:25px;
}

.login-btn{
width:100%;
padding:14px;
border:1px solid var(--primary);
background:transparent;
color:var(--primary);
letter-spacing:2px;
font-weight:600;
}

/* RESPONSIVE */
@media(max-width:992px){
.auth-card{
grid-template-columns:1fr;
}
.auth-right{
border-left:none;
border-top:1px solid #ddd;
}
}
.login-btn{
display:block;
text-align:center;
text-decoration:none;
width:100%;
padding:14px;
background:#8b7355;
color:#fff;
letter-spacing:2px;
font-weight:600;
border:none;
cursor:pointer;
}
.page-title-section {
            background-color: var(--bg-light);
            padding: 11px 0;
            text-align: center;
            
        }
        .page-title {
            font-size: 3rem;
            font-weight: 70;
            text-decoration: none;
            color: #8b7355;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .google-btn {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-top:12px;
  padding: 12px 16px;
  border: 1px solid #ddd;
  border-radius: 6px;
  background: #fff;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
}

.google-btn img {
  width: 18px;
  height: 18px;
}

.google-btn:hover {
  background: #f8f9fa;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

</style>
</head>

<body>
    <section class="page-title-section">
        <div class="container">
            <a href='/'class="page-title">HOME BLOOM</a>
        </div>
    </section>

<div class="auth-wrapper">
<div class="auth-card">

<!-- LEFT: SIGN UP -->
<div class="auth-left">
<h2>Create Account</h2>

<div class="form-group">
<label>Full Name *</label>
<input type="text">
</div>

<div class="form-group">
<label>Email *</label>
<input type="email">
</div>

<div class="form-group">
<label>Password *</label>
<input type="password">
</div>

<div class="form-group">
<label>Confirm Password *</label>
<input type="password">
</div>



<button class="signup-btn">SIGN UP</button>
</div>

<!-- RIGHT: LOGIN -->
<div class="auth-right">
<h3>Already have an account?</h3>

<p>
Log in to manage your orders, wishlist, and personal details.
</p>

<a href="{% url 'login' %}" class="login-btn">LOGIN</a>

<button class="google-btn">
  <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google">
  Continue with Google
</button>


</div>

</div>
</div>

</body>
</html>
