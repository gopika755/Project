<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile | Home Bloom</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Georgia", serif;
        }

        body {
            background: #e7d6c1;
        }

        .page-title-section {
            padding: 20px 0;
            text-align: center;
        }

        .page-title {
            font-size: 50px;
            text-decoration: none;
            color: #734715ff;
            letter-spacing: 3px;
        }

        .profile-wrapper {
            min-height: calc(100vh - 80px);
            margin-top: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile-card {
            width: 900px;
            display: flex;
            background: #fff;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .profile-left {
            width: 55%;
            padding: 60px;
        }

        .profile-left h2 {
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .profile-image-section {
            text-align: center;
            margin-bottom: 35px;
        }

        .profile-image-wrapper {
            width: 150px;
            height: 150px;
            margin: 0 auto 15px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #8b7355;
            background: #f5f5f5;
        }

        .profile-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .upload-btn {
            display: inline-block;
            padding: 8px 18px;
            background: #8b7355;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }

        input[type="file"] {
            display: none;
        }

        .profile-field {
            margin-bottom: 18px;
        }

        .profile-field label {
            display: block;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .profile-field input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
        }

        .save-btn {
            margin-top: 25px;
            width: 100%;
            padding: 12px;
            background: #8b7355;
            color: #fff;
            border: none;
            letter-spacing: 2px;
            cursor: pointer;
        }

        .save-btn:hover {
            background: #6f5a41;
        }

        .profile-right {
            width: 45%;
            background: #8b7355;
            color: #fff;
            padding: 60px;
            text-align: center;
        }

        .profile-right h1 {
            margin-top: 120px;
            letter-spacing: 3px;
        }

        .profile-right p {
            margin-top: 25px;
            font-size: 15px;
            line-height: 1.6;
        }
    </style>
</head>

<body>

<section class="page-title-section">
    <a href="/" class="page-title">HOME BLOOM</a>
</section>

<div class="profile-wrapper">
    <div class="profile-card">

        <!-- LEFT -->
        <div class="profile-left">
            <h2>Edit Profile</h2>

            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}

                <!-- PROFILE IMAGE -->
                <div class="profile-image-section">
                    <div class="profile-image-wrapper">
                        <img src="{{ profile.image.url }}" alt="Profile Image">
                    </div>

                    <label for="profileImage" class="upload-btn">
                        Upload Photo
                    </label>
                    <input type="file" id="profileImage" name="profile_image">
                </div>

                <div class="profile-field">
                    <label>Name</label>
                    <input type="text" name="name" value="{{ request.user.first_name }}">
                </div>

                <div class="profile-field">
                    <label>Email</label>
                    <input type="email" name="email" value="{{ request.user.email }}">
                </div>


                <button type="submit" class="save-btn">
                    SAVE CHANGES
                </button>
            </form>
        </div>

        <!-- RIGHT -->
        <div class="profile-right">
            <h1>HOME BLOOM</h1>
            <p>
                Keep your profile updated for a smooth and personalized experience.
            </p>
        </div>

    </div>
</div>

</body>
</html>
