<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile | HOUSE BLOOM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family:'Jost', sans-serif;
        }

        body {
            background: #e7d6c1;
        }

        /* ===== LOGO ===== */
        .logo-section {
            padding: 15px 0;
            display: flex;
            justify-content: center;
            background-color: #fff;
        }

        .logo {
            max-width: 250px;
            width: 100%;
            height: auto;
        }

        /* ===== LAYOUT ===== */
        .profile-wrapper {
            min-height: calc(100vh - 80px);
            margin-top: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 16px 40px;
        }

        .profile-card {
            width: 100%;
            max-width: 900px;
            display: flex;
            background: #fff;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        /* ===== LEFT ===== */
        .profile-left {
            width: 55%;
            padding: 60px;
        }

        .profile-left h2 {
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        /* ===== IMAGE ===== */
        .profile-image-section {
            text-align: center;
            margin-bottom: 35px;
        }

        .profile-image-wrapper {
            width: 150px;
            height: 150px;
            margin: 0 auto 15px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #8b7355;
            background: #f5f5f5;
        }

        .profile-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .upload-btn {
            display: inline-block;
            padding: 8px 18px;
            background: #8b7355;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }

        input[type="file"] {
            display: none;
        }

        /* ===== FORM ===== */
        .profile-field {
            margin-bottom: 18px;
        }

        .profile-field label {
            display: block;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .profile-field input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
        }

        .save-btn {
            margin-top: 25px;
            width: 100%;
            padding: 12px;
            background: #8b7355;
            color: #fff;
            border: none;
            letter-spacing: 2px;
            cursor: pointer;
        }

        .save-btn:hover {
            background: #6f5a41;
        }

        /* ===== RIGHT ===== */
        .profile-right {
            width: 45%;
            background: #8b7355;
            color: #fff;
            padding: 60px;
            text-align: center;
        }

        .profile-right h1 {
            margin-top: 120px;
            letter-spacing: 3px;
        }

        .profile-right p {
            margin-top: 25px;
            font-size: 15px;
            line-height: 1.6;
        }

        /* ===== RESPONSIVE ===== */

        @media (max-width: 768px) {
            .logo { max-width: 180px; }

            .profile-card {
                flex-direction: column;
            }

            .profile-left {
                width: 100%;
                padding: 30px 24px;
            }

            .profile-right {
                width: 100%;
                padding: 30px 24px;
            }

            .profile-right h1 {
                margin-top: 0;
                font-size: 1.4rem;
            }
        }

        @media (max-width: 480px) {
            .profile-left { padding: 24px 16px; }
            .profile-right { padding: 24px 16px; }
            .profile-left h2 { font-size: 1.1rem; letter-spacing: 1px; }
            .save-btn { font-size: 13px; letter-spacing: 1px; }
            .profile-image-wrapper { width: 120px; height: 120px; }
        }
    </style>
</head>

<body>

<section class="logo-section">
    <a href="/">
        <img src="/media/logo1.png" alt="House Bloom Logo" class="logo">
    </a>
</section>

<div class="profile-wrapper">
    <div class="profile-card">

        <!-- LEFT -->
        <div class="profile-left">
            <h2>Edit Profile</h2>

            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}

                <!-- PROFILE IMAGE -->
                <div class="profile-image-section">
                    <div class="profile-image-wrapper">
                        <img src="{{ profile.image.url }}" alt="Profile Image">
                    </div>

                    <label for="profileImage" class="upload-btn">
                        Upload Photo
                    </label>
                    <input type="file" id="profileImage" name="profile_image">
                </div>

                <div class="profile-field">
                    <label>Name</label>
                    <input type="text" name="name" value="{{ request.user.first_name }}">
                </div>

                <div class="profile-field">
                    <label>Email</label>
                    <input type="email" name="email" value="{{ request.user.email }}">
                </div>

                <button type="submit" class="save-btn">
                    SAVE CHANGES
                </button>
            </form>
        </div>

        <!-- RIGHT -->
        <div class="profile-right">
            <h1>HOME BLOOM</h1>
            <p>
                Keep your profile updated for a smooth and personalized experience.
            </p>
        </div>

    </div>
</div>

</body>
</html>
