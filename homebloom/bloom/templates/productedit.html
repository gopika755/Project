<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Product | HOME BLOOM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f4f1ec;
        }

        .dashboard-wrapper {
            display: flex;
            min-height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            background: #3f3007;
            color: #fff;
            padding: 30px 20px;
        }

        .brand {
            font-size: 1.4rem;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }

        .sidebar nav a {
            display: block;
            color: #ddd;
            text-decoration: none;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .sidebar nav a:hover {
            background: #8B6F47;
            color: #fff;
        }

        /* MAIN */
        .main-content {
            flex: 1;
            padding: 40px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .top-bar h1 {
            font-size: 1.8rem;
            color: #3f3007;
        }

        .admin-info {
            background: #fff;
            padding: 10px 18px;
            border-radius: 10px;
            box-shadow: 0 4px 12px rgba(0,0,0,.1);
        }

        /* FORM */
        .form-card {
            background: #fff;
            padding: 30px;
            border-radius: 16px;
            max-width: 900px;
            box-shadow: 0 10px 30px rgba(0,0,0,.08);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 0.85rem;
            margin-bottom: 6px;
            color: #555;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 0.9rem;
        }

        textarea {
            resize: none;
            height: 120px;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #8B6F47;
        }

        /* IMAGES */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        .preview-img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid #ddd;
            margin-bottom: 6px;
        }

        /* BUTTONS */
        .form-actions {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-save {
            background: #8B6F47;
            color: #fff;
        }

        .btn-cancel {
            background: #e0e0e0;
            color: #333;
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .image-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
        .logout{
    margin-top:30px;
    background:#2b2205;
}
    </style>
</head>
<body>

<div class="dashboard-wrapper">

  <aside class="sidebar">
        <h2 class="brand">HOME BLOOM</h2>

        <nav>
            <a href="{% url 'admindashboard' %}"class="active">Dashboard</a>
           <a href="{% url 'adminproduct' %}" >Products</a>
            <a href="{% url 'adminorder' %}">Orders</a>
             <a href="{%url 'admincustomer'%}">Customers</a>
            <a href="{%url 'admincategory'%}">Categories</a>
            <a href="{%url 'admincoupon'%}">Coupons</a>
            <a href="{%url 'addproduct'%}">Add Product</a>
            <a href="/" class="logout">Logout</a>

        </nav>
    </aside>
    <main class="main-content">

        <div class="top-bar">
            <h1>Edit Product</h1>
            <div class="admin-info">Admin</div>
        </div>

        <div class="form-card">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="form-grid">

                    <div class="form-group">
                        <label>Product Name</label>
                        <input type="text" name="name" value="{{ product.name }}" required>
                    </div>

                    <div class="form-group">
                        <label>Category</label>
                        <select name="category" onchange="this.form.submit()" required>
                            <option value="">Select category</option>
                            {% for cat in categories %}
                                <option value="{{ cat.id }}"
                                {% if selected_category_id == cat.id %}
                                    selected
                            {% endif %}
>
                                    {{ cat.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group">
                        <label>SubCategory</label>
                        <select name="subcategory" required>
                            <option value="">Select subcategory</option>
                            {% for sub in subcategories %}
                                <option value="{{ sub.id }}"
                                {% if product.subcategory_id == sub.id %}
                                    selected
                                {% endif %}>
                                    {{ sub.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                <div class="form-group">
                    <label>Price (MRP)</label>
                    <input type="number" name="price" value="{{ product.price }}" required>
                </div>

                <div class="form-group">
                    <label>Offer Price</label>
                    <input
                        type="number"
                        name="offer_price"
                        value="{{ product.offer_price|default:'' }}"
                        placeholder="Leave empty if no offer">
                </div>
                    

                    <div class="form-group">
                        <label>Quantity</label>
                        <input type="number" name="quantity" value="{{ product.quantity }}" required>
                    </div>
                   <div class="form-group">
    <label>
        <input type="checkbox" name="is_new" {% if product.is_new %}checked{% endif %}>
        Mark as What's New
    </label>
</div>

<div class="form-group">
    <label>
       <input type="checkbox" name="is_best_seller" {% if product.is_best_seller %}checked{% endif %}>
        Mark as Best Seller
    </label>
</div>



                </div>

                <div class="form-group" style="margin-top:20px;">
                    <label>Description</label>
                    <textarea name="description">{{ product.description }}</textarea>
                </div>

                <div class="image-grid">

    <div>
        {% if product.image1 %}
            <img src="{{ product.image1.url }}" class="preview-img">
        {% endif %}
        <input type="file" name="image1">
    </div><br>

    <div>
        {% if product.image2 %}
            <img src="{{ product.image2.url }}" class="preview-img">
        {% endif %}
        <input type="file" name="image2">
    </div><br>

    <div>
        {% if product.image3 %}
            <img src="{{ product.image3.url }}" class="preview-img">
        {% endif %}
        <input type="file" name="image3">
    </div><br>

    <div>
        {% if product.image4 %}
            <img src="{{ product.image4.url }}" class="preview-img">
        {% endif %}
        <input type="file" name="image4">
    </div><br>

</div>

                <div class="form-actions">
                    <button type="submit" name="submit_product" class="btn btn-save">
                        Save Changes
                    </button>
                    <a href="{% url 'adminproduct' %}" class="btn btn-cancel">Cancel</a>
                </div>

            </form>
        </div>

    </main>
</div>

</body>
</html>
