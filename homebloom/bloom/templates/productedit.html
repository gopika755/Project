<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Product | Admin Dashboard | HOME BLOOM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            background:#f4f1ec;
        }

        .dashboard-wrapper{
            display:flex;
            min-height:100vh;
        }

        /* SIDEBAR */
        .sidebar{
            width:240px;
            background:#3f3007;
            color:#fff;
            padding:30px 20px;
        }

        .brand{
            font-size:1.4rem;
            letter-spacing:2px;
            margin-bottom:40px;
        }

        .sidebar nav a{
            display:block;
            color:#ddd;
            text-decoration:none;
            padding:12px 15px;
            border-radius:8px;
            margin-bottom:10px;
        }

        .sidebar nav a:hover,
        .sidebar nav a.active{
            background:#8B6F47;
            color:#fff;
        }

        .logout{
            margin-top:30px;
            background:#2b2205;
        }

        /* MAIN */
        .main-content{
            flex:1;
            padding:30px 40px;
        }

        .top-bar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:30px;
        }

        .top-bar h1{
            font-size:1.8rem;
            color:#3f3007;
        }

        .admin-info{
            background:#fff;
            padding:10px 18px;
            border-radius:10px;
            box-shadow:0 4px 12px rgba(0,0,0,.1);
        }

        /* FORM CARD */
        .form-card{
            background:#fff;
            border-radius:18px;
            padding:30px;
            max-width:900px;
            box-shadow:0 10px 30px rgba(0,0,0,.08);
        }

        .form-grid{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:25px;
        }

        .form-group{
            display:flex;
            flex-direction:column;
        }

        .form-group.full{
            grid-column:1 / -1;
        }

        label{
            font-size:0.85rem;
            color:#555;
            margin-bottom:6px;
        }

        input, select, textarea{
            padding:12px 14px;
            border-radius:10px;
            border:1px solid #ccc;
            font-size:0.9rem;
        }

        textarea{
            resize:none;
            height:100px;
        }

        /* BUTTONS */
        .form-actions{
            margin-top:30px;
            display:flex;
            gap:15px;
        }

        .btn{
            padding:12px 22px;
            border-radius:10px;
            border:none;
            font-size:0.9rem;
            text-decoration:none;
            cursor:pointer;
            color:#fff;
        }

        .save{
            background:#8B6F47;
        }

        .cancel{
            background:#555;
        }

        @media(max-width:768px){
            .form-grid{
                grid-template-columns:1fr;
            }
        }

        @media(max-width:576px){
            .sidebar{
                display:none;
            }
        }
    </style>
</head>
<body>

<div class="dashboard-wrapper">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2 class="brand">HOME BLOOM</h2>
        <nav>
           <a href="{% url 'admindashboard' %}">Dashboard</a>
            <a href="{%url 'adminproduct'%}">Products</a>
            <a href="{% url 'adminorder' %}">Orders</a>
             <a href="{%url 'admincustomer'%}">Customers</a>
            <a href="{%url 'admincategory'%}">Categories</a>
            <a href="{%url 'admincoupon'%}">Coupons</a>
            <a href="/" class="logout">Logout</a>
        </nav>
    </aside>

    <!-- MAIN -->
    <main class="main-content">

        <div class="top-bar">
            <h1>Edit Product</h1>
            <div class="admin-info">Admin</div>
        </div>

        <div class="form-card">
            <form method="post">
                <!-- Django: {% csrf_token %} -->

                <div class="form-grid">

                    <div class="form-group">
                        <label>Product Name</label>
                        <input type="text" value="Modern Sofa">
                    </div>

                    <div class="form-group">
                        <label>Category</label>
                        <select>
                            <option>Living Room</option>
                            <option>Bedroom</option>
                            <option>Dining</option>
                            <option>Decor</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Sales Price</label>
                        <input type="number" value="39999">
                    </div>

                    <div class="form-group">
                        <label>Offer Price</label>
                        <input type="number" value="32999">
                    </div>

                    <div class="form-group">
                        <label>Offer (%)</label>
                        <input type="number" value="20">
                    </div>

                    <div class="form-group">
                        <label>Quantity</label>
                        <input type="number" value="14">
                    </div>

                    <div class="form-group full">
                        <label>Description</label>
                        <textarea>Premium quality modern sofa for living rooms.</textarea>
                    </div>

                </div>

                <div class="form-actions">
                    <a href="{%url 'adminproduct' %}"type="submit" class="btn save">Save Changes</a>
                    <a href="{% url 'adminproduct' %}" class="btn cancel">Cancel</a>
                </div>

            </form>
        </div>

    </main>
</div>

</body>
</html>
